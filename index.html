<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The[SYSTEM]Archive</title>
    <style>
        /* System Resets & Root Variables */
        :root {
            --bg-color: #0a0a0a;
            --ui-bg: rgba(10, 10, 10, 0.9);
            --text-primary: #e0e0e0;
            --text-muted: #888888;
            --border: #333333;
            --accent: #ffffff;
            --nav-height: 60px;
            --footer-height: 40px;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: monospace;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Global Navigation */
        #global-nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--nav-height);
            background-color: var(--ui-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 1000;
            gap: 20px;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-primary);
            border: none;
            font-size: 14px;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .nav-btn:hover { color: var(--accent); }

        /* Global Footer */
        #global-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--footer-height);
            background-color: var(--ui-bg);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #global-footer a {
            color: var(--text-primary);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
        }

        #global-footer a:hover { color: var(--accent); }

        /* Viewport Container */
        #viewport {
            position: absolute;
            top: var(--nav-height);
            bottom: var(--footer-height);
            left: 0;
            width: 100%;
            overflow: hidden;
        }

        /* View States */
        .view-state {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .view-state.active { display: block; }

        /* Background Layers */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Home Sub-States (The Protocol) */
        .home-sub-state {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 1;
        }
        .home-sub-state.active {
            opacity: 1;
            pointer-events: auto;
        }
     
        /* Action Buttons */
        .action-btn {
            background-color: rgba(10, 10, 10, 0.85);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 15px 30px;
            font-size: 16px;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }
        .action-btn:hover {
            background-color: var(--text-primary);
            color: var(--bg-color);
        }

        /* Interface Formatting */
        .center-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        /* Text Boxes (About, Legal) */
        .text-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--border);
            padding: 40px;
            text-align: center;
            z-index: 10;
            min-width: 300px;
        }

        /* Explore Sequence Styles */
        #explore-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
        }
        
        #explore-image {
            max-height: 95%;
            max-width: 90%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            z-index: 5;
        }

        .side-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); }
        #btn-prev { left: 30px; }
        #btn-next { right: 30px; }

        /* --- Mobile Device Optimization --- */
        @media (max-width: 768px) {
            #global-nav {
                flex-wrap: wrap;
                justify-content: center;
                height: auto;
                padding: 10px;
                gap: 10px;
            }
            #viewport { top: 90px; }
            .text-box { width: 85%; padding: 25px; min-width: unset; box-sizing: border-box; }
            #explore-container { flex-direction: column; justify-content: flex-start; padding-top: 20px; }
            #explore-image { max-height: 65vh; margin-bottom: 20px; }
            
            #mobile-explore-controls {
                display: flex;
                justify-content: center;
                width: 100%;
                z-index: 10;
            }
            .side-nav-btn {
                position: relative;
                top: auto;
                transform: none;
                left: auto;
                right: auto;
                display: inline-block;
                margin: 0 10px;
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- Persistent Header -->
    <nav id="global-nav">
        <button class="nav-btn" onclick="setView('home')">Download</button>
        <button class="nav-btn" onclick="setView('explore')">Explore</button>
        <button class="nav-btn" onclick="setView('about')">About</button>
    </nav>

    <!-- Main Dynamic Viewport -->
    <main id="viewport">
        
        <!-- View 1: Download / Home -->
        <div id="view-home" class="view-state active">
            <!-- Protocol State 1: Initiation -->
            <div id="state-initiation" class="home-sub-state active" style="background-image: url('image_1.jpg');">
                <div class="center-ui">
                    <button id="btn-download" class="action-btn">Download: <u>The </u>[SYSTEM]<u> Archive</u></button>
                </div>
            </div>

            <!-- Protocol State 2: Completion -->
            <div id="state-completion" class="home-sub-state" style="background-image: url('image_2.jpg');">
                <!-- Visual confirmation handled by background image transition -->
            </div>
        </div>

        <!-- View 2: Explore (27 Page Sequence) -->
        <div id="view-explore" class="view-state">
            <div id="explore-container">
                <img id="explore-image" src="page_1.jpg" alt="A4 Page Image">
                <div id="mobile-explore-controls">
                    <button id="btn-prev" class="action-btn side-nav-btn" onclick="navigateExplore(-1)">Previous</button>
                    <button id="btn-next" class="action-btn side-nav-btn" onclick="navigateExplore(1)">Next</button>
                </div>
            </div>
        </div>

        <!-- View 3: About -->
        <div id="view-about" class="view-state">
            <div class="bg-layer" style="background-image: url('about_bg.jpg');"></div>
            <div class="text-box">
                <p>to be written</p>
            </div>
        </div>

        <!-- View 4: Legal -->
        <div id="view-legal" class="view-state">
            <div class="text-box">
                <h2>[LEGAL]</h2>
                <p>Terms and Copyright parameters to be defined.</p>
            </div>
        </div>

    </main>

    <!-- Persistent Footer -->
    <footer id="global-footer">
        <a href="#" onclick="setView('legal')">&copy; 2026 The[SYSTEM]Archive — [LEGAL]</a>
    </footer>

    <!-- Core Logic -->
    <script>
        // System Variables
        const TOTAL_EXPLORE_PAGES = 27;
        let currentExplorePage = 1;
        const targetDocument = 'target_document.pdf';
        let downloadInitiated = false;

        // --- Initialization & Deep Linking ---
        document.addEventListener('DOMContentLoaded', () => {
            // Check URL hash for direct links (e.g., #explore-14)
            handleUrlState();
            
            // Listen for browser back/forward buttons
            window.addEventListener('popstate', handleUrlState);
            
            // Keyboard Navigation (Left/Right Arrows)
            document.addEventListener('keydown', (e) => {
                if (document.getElementById('view-explore').classList.contains('active')) {
                    if (e.key === 'ArrowRight') navigateExplore(1);
                    if (e.key === 'ArrowLeft') navigateExplore(-1);
                }
            });

          // State Transition Protocol Logic
            const downloadButton = document.getElementById('btn-download');
            const stateInitiation = document.getElementById('state-initiation');
            const stateCompletion = document.getElementById('state-completion');

            downloadButton.addEventListener('click', () => {
                if(downloadInitiated) return; 
                
                // 1. Execute File Download
                const link = document.createElement('a');
                link.href = targetDocument;
                link.download = targetDocument;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                // 2. Execute Background State Transition Protocol
                stateInitiation.classList.remove('active');
                stateCompletion.classList.add('active');
                downloadInitiated = true;
            });
        });

        // --- View Routing ---
        function setView(viewId, pushHistory = true) {
            document.querySelectorAll('.view-state').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + viewId).classList.add('active');
            
            if (viewId === 'explore') {
                updateExploreControls();
                preloadImage(currentExplorePage + 1); // Preload next page
            }

            // Update URL cleanly without reloading
            if (pushHistory) {
                const hash = viewId === 'explore' ? `#explore-${currentExplorePage}` : `#${viewId}`;
                history.pushState({ view: viewId, page: currentExplorePage }, '', hash);
            }
        }

        // --- Explore Logic & Preloading ---
        function navigateExplore(direction) {
            const newPage = currentExplorePage + direction;
            if (newPage >= 1 && newPage <= TOTAL_EXPLORE_PAGES) {
                currentExplorePage = newPage;
                document.getElementById('explore-image').src = `page_${currentExplorePage}.jpg`;
                updateExploreControls();
                
                // Update URL to match current page
                history.pushState({ view: 'explore', page: currentExplorePage }, '', `#explore-${currentExplorePage}`);
                
                // Preload the next logical image based on reading direction
                preloadImage(currentExplorePage + direction);
            }
        }

        function updateExploreControls() {
            const btnPrev = document.getElementById('btn-prev');
            const btnNext = document.getElementById('btn-next');
            btnPrev.style.display = (currentExplorePage === 1) ? 'none' : 'inline-block';
            btnNext.style.display = (currentExplorePage === TOTAL_EXPLORE_PAGES) ? 'none' : 'inline-block';
        }

        function preloadImage(pageNum) {
            if (pageNum >= 1 && pageNum <= TOTAL_EXPLORE_PAGES) {
                const img = new Image();
                img.src = `page_${pageNum}.jpg`;
            }
        }

        function handleUrlState() {
            const hash = window.location.hash;
            if (hash.startsWith('#explore-')) {
                const requestedPage = parseInt(hash.replace('#explore-', ''));
                if (requestedPage >= 1 && requestedPage <= TOTAL_EXPLORE_PAGES) {
                    currentExplorePage = requestedPage;
                    document.getElementById('explore-image').src = `page_${currentExplorePage}.jpg`;
                }
                setView('explore', false);
            } else if (hash && hash !== '#') {
                const validViews = ['home', 'about', 'legal'];
                const targetView = hash.replace('#', '');
                if (validViews.includes(targetView)) {
                    setView(targetView, false);
                } else {
                    setView('home', false);
                }
            } else {
                setView('home', false);
            }
        }
    </script>
</body>
</html>
